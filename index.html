<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO Dashboard v4 — 2026 결산리뷰 (1~5월)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;
  --border:#252a3a;--border2:#2f3650;
  --text:#e8eaf0;--text2:#8b92a8;--text3:#555e78;
  --blue:#4a9eff;--green:#3ecf8e;--amber:#f5a623;--red:#ff5f5f;--purple:#9b8afb;--teal:#2dd4bf;--pink:#f472b6;
  --green-dim:#0d3d27;--amber-dim:#4a320a;--red-dim:#4a1515;
  font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:32px 28px;max-width:380px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.login-card h1{font-size:18px;margin-bottom:6px;letter-spacing:-.02em;font-weight:600}
.login-card p{font-size:12px;color:var(--text2);margin-bottom:22px}
.login-card input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:inherit;margin-bottom:10px}
.login-card input:focus{outline:none;border-color:var(--blue)}
.login-card button{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .15s}
.login-card button:hover{background:#5fb0ff}
.login-card button:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}
.app{display:none;min-height:100vh}
.app.on{display:flex}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 14px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{font-size:15px;font-weight:600;margin-bottom:4px;letter-spacing:-.02em}
.brand-sub{font-size:11px;color:var(--text2);margin-bottom:20px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav-btn{background:transparent;border:none;color:var(--text2);text-align:left;padding:9px 12px;border-radius:7px;font-size:12.5px;font-family:inherit;cursor:pointer;transition:all .12s}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.on{background:var(--bg3);color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.main{flex:1;padding:24px;overflow-x:hidden;min-width:0}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.hdr-title{font-size:20px;font-weight:600;letter-spacing:-.02em}
.hdr-sub{font-size:12px;color:var(--text2);margin-top:3px}
.page{display:none}
.page.on{display:block}
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.kgrid.three{grid-template-columns:repeat(3,1fr)}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kcard.b::before{background:var(--blue)}.kcard.g::before{background:var(--green)}.kcard.a::before{background:var(--amber)}
.kcard.r::before{background:var(--red)}.kcard.p::before{background:var(--purple)}.kcard.t::before{background:var(--teal)}.kcard.pk::before{background:var(--pink)}
.klbl{font-size:11px;color:var(--text2);margin-bottom:5px}
.kval{font-size:22px;font-weight:600;letter-spacing:-.03em}
.kval span{font-size:12px;font-weight:400;color:var(--text2);margin-left:3px}
.kval.neg{color:var(--red)}.kval.pos{color:var(--green)}
.ksub{font-size:11px;color:var(--text2);margin-top:4px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;margin-top:4px;font-weight:500}
.up{background:var(--green-dim);color:var(--green)}.dn{background:var(--red-dim);color:var(--red)}.wr{background:var(--amber-dim);color:var(--amber)}.neu{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:14px}
.cgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.cgrid2 .card{margin-bottom:0}
.ctitle{font-size:13px;font-weight:500;margin-bottom:12px;color:var(--text)}
.ctitle small{font-size:11px;font-weight:400;color:var(--text2);margin-left:6px}
.insight{background:linear-gradient(135deg,rgba(74,158,255,.08),rgba(155,138,251,.05));border:1px solid var(--border2);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:12px;line-height:1.7}
.insight-h{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:6px}
.insight ul{margin:0;padding-left:18px;color:var(--text)}
.insight li{margin-bottom:2px}
.tbl{width:100%;font-size:12px;border-collapse:collapse}
.tbl th{text-align:left;color:var(--text2);font-weight:400;padding:7px 8px;border-bottom:1px solid var(--border);font-size:11px}
.tbl td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl td.r{text-align:right;font-variant-numeric:tabular-nums}
.tbl tr:last-child td{border:none}
.tbl .tot td{font-weight:600;background:var(--bg3)}
.tbl .hl td{background:rgba(74,158,255,.06)}
.tbl .sec td{background:rgba(155,138,251,.05)}
.tbl .sub td{color:var(--text2);font-size:11px;padding-left:18px}
.tbl .neg{color:var(--red)}
.tbl .pos{color:var(--green)}
.hmap-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px}
.hmap{border-collapse:collapse;font-size:11px;min-width:800px;width:100%}
.hmap th{padding:7px 8px;color:var(--text2);font-weight:400;border-bottom:1px solid var(--border);font-size:10px;white-space:nowrap;background:var(--bg2);text-align:right}
.hmap th.ch-h{text-align:left}
.hmap td{padding:5px 8px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:right;font-size:11px;white-space:nowrap;font-variant-numeric:tabular-nums}
.hmap .ch-name{text-align:left;color:var(--text);background:var(--bg3);position:sticky;left:0;min-width:120px;font-weight:500}
.chart-box{position:relative;height:280px}
.chart-box.tall{height:360px}
@media (max-width:768px){
  .app{flex-direction:column}
  .sidebar{position:relative;width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:14px}
  .nav{flex-direction:row;flex-wrap:wrap;gap:6px;overflow-x:auto}
  .nav-btn{padding:7px 11px;font-size:12px;white-space:nowrap}
  .main{padding:14px}
  .kgrid,.kgrid.three{grid-template-columns:repeat(2,1fr)}
  .cgrid2{grid-template-columns:1fr}
  .kval{font-size:18px}
  .hdr-title{font-size:17px}
  .chart-box{height:240px}
  .chart-box.tall{height:280px}
}

.est { opacity: 0.7; font-style: italic; }
.est::after { content: ' (E)'; font-size: 10px; color: var(--amber); }
td.est-cell { background: rgba(245,166,35,.06) !important; }
.note-banner { background: rgba(245,166,35,.08); border: 1px solid rgba(245,166,35,.25); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: var(--amber); }
</style>
</head>

  <div class="login-card">
    <h1>CEO Dashboard v4</h1>
    <p>2026 결산리뷰 · 1~5월 결산</p>
    <input type="password" id="pwd" placeholder="비밀번호 입력" autofocus />
    <button id="loginBtn" onclick="doLogin()">접속</button>
    <div class="login-err" id="err"></div>

</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand">CEO Dashboard v4</div>

    <nav class="nav" id="nav"></nav>

  <main class="main">
    <div class="hdr">

      <div class="hdr-sub">단위: 백만원</div>
    </div>
    <div id="pages"></div>
  </main>
</div>

const SALT= "/W3Fht2rTiAIeTkG8/+QMA==";
const IV  = "mMmOaGKWvc+9QUDi";

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
}
async function decryptData(b64ct, b64salt, b64iv, password) {
  const salt = Uint8Array.from(atob(b64salt), c=>c.charCodeAt(0));
  const iv   = Uint8Array.from(atob(b64iv),   c=>c.charCodeAt(0));
  const ct   = Uint8Array.from(atob(b64ct),   c=>c.charCodeAt(0));
  const key  = await deriveKey(password, salt);
  const pt   = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

let DATA = null;
async function doLogin() {
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('loginBtn');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '복호화 중...';
  try {
    DATA = await decryptData(CT, SALT, IV, pwd);
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').classList.add('on');
    renderAll();
  } catch(e) {
    err.textContent = '비밀번호가 올바르지 않습니다.';
    btn.disabled = false;
    btn.textContent = '접속';
  }
}
document.getElementById('pwd').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

function fmt(n, dec){ if(n===null||n===undefined||isNaN(n)) return '-'; dec=dec===undefined?1:dec; return Number(n).toLocaleString('ko-KR',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function pct(n){ if(n===null||n===undefined||isNaN(n)) return '-'; const s=n>=0?'+':''; return s+Number(n).toFixed(1)+'%'; }
function cls(n){ return n>=0?'pos':'neg'; }
function badge(n,suffix){ if(n===null||n===undefined) return '<span class="badge neu">-</span>'; const c=n>=0?'up':'dn'; return `<span class="badge ${c}">${pct(n)}${suffix||''}</span>`; }
function chartScales(){ return { x:{grid:{color:'#252a3a'},ticks:{color:'#8b92a8',font:{size:11}}}, y:{grid:{color:'#252a3a'},ticks:{color:'#8b92a8',font:{size:11}}} }; }

function renderAll(){
  const nav=document.getElementById('nav');
  nav.innerHTML=PAGES.map(([id,t,s])=>`<button class="nav-btn" data-page="${id}" onclick="goPage('${id}')">${t}</button>`).join('');
  document.getElementById('pages').innerHTML=PAGES.map(([id])=>`<section class="page" id="page-${id}"></section>`).join('');
  pageSummary();pageChannel();pageSku();pageMatrix();pagePnl();pageYoy();pageMultiyear();pageTarget();pageSources();
  goPage('summary');
}
function goPage(id){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('on',b.dataset.page===id));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('on',p.id==='page-'+id));
  const meta=PAGES.find(p=>p[0]===id);
  if(meta){document.getElementById('pageTitle').textContent=meta[1];document.getElementById('pageSub').textContent=meta[2];}
  setTimeout(()=>{window.dispatchEvent(new Event('resize'));},50);
}

function pageMatrix(){
  const hm=DATA.heatmap; let maxV=0;
  hm.matrix.forEach(row=>row.forEach(v=>{if(v>maxV)maxV=v;}));
  let hotCh='',hotSku='',hotV=0;
  hm.matrix.forEach((row,i)=>row.forEach((v,j)=>{if(v>hotV){hotV=v;hotCh=hm.channels[i];hotSku=hm.skus[j];}}));
  let html='<div class="insight"><div class="insight-h">📊 인사이트</div><ul>';
  html+=`<li>최대 셀: <b>${hotCh}</b> × <b>${hotSku}</b> = ${fmt(hotV)}백만원</li>`;
  html+=`<li>채널 ${hm.channels.length}개 × SKU ${hm.skus.length}개 매트릭스, 색이 짙을수록 매출 규모가 큰 셀</li>`;
  html+=`<li>TOP 채널 ${hm.channels[0]} × TOP SKU ${hm.skus[0]} 조합이 의사결정 우선순위</li></ul></div>`;
  html+='<div class="card"><div class="ctitle">채널 × SKU 매트릭스 <small>1~5월 YTD 누계 (백만원)</small></div>';
  html+='<div class="hmap-wrap"><table class="hmap"><thead><tr><th class="ch-h">채널 \\ SKU</th>';
  hm.skus.forEach(s=>{html+=`<th title="${s.replace(/"/g,'&quot;')}">${s.length>10?s.slice(0,10)+'…':s}</th>`;});
  html+='</tr></thead><tbody>';
  hm.matrix.forEach((row,i)=>{html+=`<tr><td class="ch-name">${hm.channels[i]}</td>`;
    row.forEach(v=>{const ratio=maxV>0?v/maxV:0;const alpha=Math.min(.85,ratio*.9+(v>0?.04:0));html+=`<td style="background:rgba(74,158,255,${alpha.toFixed(3)});color:${ratio>.4?'#fff':'#e8eaf0'}">${v>0?fmt(v):'-'}</td>`;});
    html+='</tr>';});
  html+='</tbody></table></div></div>';
  document.getElementById('page-matrix').innerHTML=html;
}

function pageYoy(){
  const my=DATA.multiyear, d25=my['2025'], d26=my['2026'];

  const yoyMonthly=rev25.map((v,i)=>v>0?((rev26[i]-v)/v*100):0);
  let rows='';
  for(let i=0;i<5;i++){const yoy=rev25[i]>0?((rev26[i]-rev25[i])/rev25[i]*100):0;
    rows+=`<tr><td>${M5[i]}</td><td class="r">${fmt(rev25[i])}</td><td class="r">${fmt(rev26[i])}</td><td class="r ${cls(yoy)}">${pct(yoy)}</td><td class="r ${cls(opi25[i])}">${fmt(opi25[i])}</td><td class="r ${cls(opi26[i])}">${fmt(opi26[i])}</td></tr>`;}
  const tot25=rev25.reduce((a,b)=>a+b,0),tot26=rev26.reduce((a,b)=>a+b,0);
  const totYoy=tot25>0?(tot26-tot25)/tot25*100:0;
  const to25=opi25.reduce((a,b)=>a+b,0),to26=opi26.reduce((a,b)=>a+b,0);
  rows+=`<tr class="tot"><td>1~5월 합계</td><td class="r">${fmt(tot25)}</td><td class="r">${fmt(tot26)}</td><td class="r ${cls(totYoy)}">${pct(totYoy)}</td><td class="r ${cls(to25)}">${fmt(to25)}</td><td class="r ${cls(to26)}">${fmt(to26)}</td></tr>`;

  const validYoy=yoyMonthly.filter(v=>v!==0); const bestIdx=yoyMonthly.indexOf(Math.max(...validYoy));
  document.getElementById('page-yoy').innerHTML=`
    <div class="insight"><div class="insight-h">📊 인사이트</div><ul>
      <li>1~5월 매출 YoY: <b>${pct(totYoy)}</b> (2025 ${fmt(tot25)} → 2026 ${fmt(tot26)}백만원)</li>

      <li>최고 성장 월: <b>${M5[bestIdx]}</b> (${pct(yoyMonthly[bestIdx])})</li>
    </ul></div>
    <div class="cgrid2">
      <div class="card"><div class="ctitle">월별 매출 비교 <small>2025 vs 2026 (백만원)</small></div><div class="chart-box"><canvas id="yoy-rev"></canvas></div></div>
      <div class="card"><div class="ctitle">월별 영업이익 비교 <small>2025 vs 2026 (백만원)</small></div><div class="chart-box"><canvas id="yoy-opi"></canvas></div></div>
    </div>
    <div class="card"><div class="ctitle">월별 상세</div><table class="tbl"><thead><tr><th>월</th><th class="r">2025 매출</th><th class="r">2026 매출</th><th class="r">YoY</th><th class="r">2025 영업이익</th><th class="r">2026 영업이익</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="card"><div class="ctitle">연도별 1~5월 누계 비교 <small>2023 ~ 2026 (백만원)</small></div><table class="tbl"><thead><tr><th>연도</th><th class="r">매출</th><th class="r">영업이익</th><th class="r">영업이익률</th></tr></thead><tbody>${histRows}</tbody></table></div>`;
  new Chart(document.getElementById('yoy-rev'),{type:'bar',data:{labels:M5,datasets:[{label:'2025',data:rev25,backgroundColor:'#555e78'},{label:'2026',data:rev26,backgroundColor:'#4a9eff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8b92a8',font:{size:11}}}},scales:chartScales()}});
  new Chart(document.getElementById('yoy-opi'),{type:'bar',data:{labels:M5,datasets:[{label:'2025',data:opi25,backgroundColor:'#555e78'},{label:'2026',data:opi26,backgroundColor:opi26.map(v=>v>=0?'#3ecf8e':'#ff5f5f')}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8b92a8',font:{size:11}}}},scales:chartScales()}});
}

function pageMultiyear(){
  const at=DATA.annualTotals, years=['2022','2023','2024','2025'];
  const rev=years.map(y=>at[y].rev), opi=years.map(y=>at[y].opi);
  const rev26=DATA.kpi.ytdRevenue, opi26=DATA.kpi.ytdOpi;
  let rows='';
  years.forEach((y,i)=>{rows+=`<tr><td>${y}년</td><td class="r">${fmt(rev[i])}</td><td class="r ${cls(opi[i])}">${fmt(opi[i])}</td><td class="r">${rev[i]>0?fmt(opi[i]/rev[i]*100,2):'-'}%</td></tr>`;});
  rows+=`<tr class="hl"><td>2026년 (1~5월)</td><td class="r">${fmt(rev26)}</td><td class="r ${cls(opi26)}">${fmt(opi26)}</td><td class="r">${fmt(DATA.kpi.opiMargin,2)}%</td></tr>`;
  const cagrHtml=DATA.kpi.cagr3yr!==null?`
    <div class="kgrid three" style="margin-top:14px">
      <div class="kcard b"><div class="klbl">3년 CAGR (매출)</div><div class="kval">${pct(DATA.kpi.cagr3yr)}</div><div class="ksub">2022 → 2025 연평균</div></div>
      <div class="kcard g"><div class="klbl">2026 Run-rate (연환산)</div><div class="kval">${fmt(rev26/5*12)}<span>백만원</span></div><div class="ksub">1~5월 기준 단순 연환산</div></div>
      <div class="kcard a"><div class="klbl">2025 대비 Run-rate</div><div class="kval">${fmt((rev26/5*12/rev[3]-1)*100,1)}<span>%</span></div><div class="ksub">2025 연 매출 ${fmt(rev[3])}백만원</div></div>
    </div>`:'';
  document.getElementById('page-multiyear').innerHTML=`
    <div class="insight"><div class="insight-h">📊 인사이트</div><ul>
      <li>매출 추이: 2022 ${fmt(rev[0])} → 2025 ${fmt(rev[3])}백만원 (3년 CAGR ${pct(DATA.kpi.cagr3yr)})</li>
      <li>영업이익 추이: 2022 ${fmt(opi[0])} → 2025 ${fmt(opi[3])}백만원 (개선 ${fmt(opi[3]-opi[0],1)}백만원)</li>
      <li>2026 1~5월 (5개월) 만에 ${fmt(rev26)}백만원 = 2025 연 매출의 ${fmt(rev26/rev[3]*100,1)}% 수준</li>
    </ul></div>
    ${cagrHtml}
    <div class="cgrid2">
      <div class="card"><div class="ctitle">연도별 매출 <small>2022 ~ 2025 (백만원)</small></div><div class="chart-box"><canvas id="my-rev"></canvas></div></div>
      <div class="card"><div class="ctitle">연도별 영업이익 <small>2022 ~ 2025 (백만원)</small></div><div class="chart-box"><canvas id="my-opi"></canvas></div></div>
    </div>
    <div class="card"><div class="ctitle">연도별 손익 요약</div><table class="tbl"><thead><tr><th>연도</th><th class="r">매출</th><th class="r">영업이익</th><th class="r">영업이익률</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  new Chart(document.getElementById('my-rev'),{type:'bar',data:{labels:years,datasets:[{label:'매출',data:rev,backgroundColor:'#4a9eff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:chartScales()}});
  new Chart(document.getElementById('my-opi'),{type:'bar',data:{labels:years,datasets:[{label:'영업이익',data:opi,backgroundColor:opi.map(v=>v>=0?'#3ecf8e':'#ff5f5f')}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:chartScales()}});
}

function pageTarget(){
  const t=DATA.target2026, targetMo=t.monthly, actualMo=DATA.multiyear['2026']['매출액'];
  let cumT=[],cumA=[],st=0,sa=0;
  for(let i=0;i<12;i++){st+=targetMo[i]||0;cumT.push(st);if(i<5){sa+=actualMo[i]||0;cumA.push(sa);}else cumA.push(null);}
  let chRows=t.channels.map(c=>{const rate=c.target>0?c.actual/c.target*100:0;return `<tr><td>${c.channel}</td><td class="r">${fmt(c.target)}</td><td class="r">${fmt(c.actual)}</td><td class="r">${fmt(rate,1)}%</td></tr>`;}).join('');
  const totT=t.channels.reduce((s,c)=>s+c.target,0),totA=t.channels.reduce((s,c)=>s+c.actual,0);
  chRows+=`<tr class="tot"><td>합계</td><td class="r">${fmt(totT)}</td><td class="r">${fmt(totA)}</td><td class="r">${fmt(totT>0?totA/totT*100:0,1)}%</td></tr>`;
  const ytdActual=actualMo.slice(0,5).reduce((a,b)=>a+b,0);
  const ytdAchieve=t.annual>0?ytdActual/t.annual*100:0;
  const target5=targetMo.slice(0,5).reduce((a,b)=>a+(b||0),0);
  const achieve5=target5>0?ytdActual/target5*100:0;
  document.getElementById('page-target').innerHTML=`
    <div class="kgrid">
      <div class="kcard b"><div class="klbl">2026년 매출 목표</div><div class="kval">${fmt(t.annual)}<span>백만원</span></div><div class="ksub">${fmt(t.annual/100,0)}억원</div></div>
      <div class="kcard g"><div class="klbl">1~5월 누계 달성</div><div class="kval">${fmt(ytdActual)}<span>백만원</span></div><div class="ksub">연 목표 대비 ${fmt(ytdAchieve,1)}%</div></div>
      <div class="kcard a"><div class="klbl">1~5월 목표 달성률</div><div class="kval ${achieve5>=100?'pos':'neg'}">${fmt(achieve5,1)}<span>%</span></div><div class="ksub">균등배분 목표 ${fmt(target5)}백만원(참고)</div></div>
      <div class="kcard p"><div class="klbl">연 목표 진척률</div><div class="kval">${fmt(ytdAchieve,1)}<span>%</span></div><div class="ksub">5/12 경과 = 41.7%</div></div>
    </div>
    <div class="insight"><div class="insight-h">📊 인사이트</div><ul>
      <li>2026 연간 매출 목표 <b>${fmt(t.annual)}백만원 (${fmt(t.annual/100,0)}억원)</b></li>
      <li>1~5월 누계 <b>${fmt(ytdActual)}백만원</b> (연 목표의 ${fmt(ytdAchieve,1)}%, 기간경과 41.7%)</li>
      <li>최대 채널 다이소: 목표 ${fmt(t.channels[0].target)} → 실적 ${fmt(t.channels[0].actual)}백만원 (${fmt(t.channels[0].actual/t.channels[0].target*100,1)}%)</li>
      <li>※ 월별 목표선은 연간목표 균등배분(참고용)이며 실제 월별 목표가 아님</li>
    </ul></div>
    <div class="card"><div class="ctitle">누적 목표(참고) vs 실적 <small>(백만원) · 목표선=연간 균등배분</small></div><div class="chart-box tall"><canvas id="tg-line"></canvas></div></div>
    <div class="card"><div class="ctitle">채널별 연간 목표 vs 1~5월 실적 <small>(백만원)</small></div><table class="tbl"><thead><tr><th>채널</th><th class="r">연간 목표</th><th class="r">1~5월 실적</th><th class="r">달성률</th></tr></thead><tbody>${chRows}</tbody></table></div>`;
  new Chart(document.getElementById('tg-line'),{data:{labels:MONTHS,datasets:[
    {type:'line',label:'목표 누적(균등,참고)',data:cumT,borderColor:'#9b8afb',borderDash:[5,4],borderWidth:2,tension:.2,fill:false,pointRadius:2},
    {type:'line',label:'실적 누적',data:cumA,borderColor:'#3ecf8e',borderWidth:2,tension:.2,fill:false,spanGaps:false,pointRadius:4},
    {type:'bar',label:'월별 실적',data:actualMo.map((v,i)=>i<5?v:null),backgroundColor:'rgba(62,207,142,.5)'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8b92a8',font:{size:11}}}},scales:chartScales()}});
}

function pageSources(){
  const list=DATA.sources.map(s=>`<li>${s}</li>`).join('');
  document.getElementById('page-sources').innerHTML=`
    <div class="card"><div class="ctitle">데이터 소스 <small>본 대시보드는 다음 원본 파일에서 추출된 데이터를 사용합니다</small></div><ul style="padding-left:20px;line-height:1.9;color:var(--text)">${list}</ul></div>
    <div class="card"><div class="ctitle">단위 및 산식 안내</div><table class="tbl"><tbody>
      <tr><td>단위</td><td>모든 금액 = <b>백만원</b> (원 ÷ 1,000,000, 소수 1자리)</td></tr>

      <tr><td>CAGR</td><td>(2025 매출 / 2022 매출)^(1/3) − 1</td></tr>
      <tr><td>채널/SKU</td><td>판매실적추이분석 20260623 · 1~5월 합계 (P&L과 원단위 일치)</td></tr>
    </tbody></table></div>
    <div class="card"><div class="ctitle">생성 정보</div><table class="tbl"><tbody>
      <tr><td>버전</td><td>v4</td></tr>
      <tr><td>마감 월</td><td>2026년 5월 (결산 확정)</td></tr>
      <tr><td>YTD</td><td>2026년 1~5월 (전 구간 확정)</td></tr>
      <tr><td>암호화</td><td>PBKDF2 (100,000 iter, SHA-256) → AES-GCM-256</td></tr>
    </tbody></table></div>`;
}

</script>
