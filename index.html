<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CEO 대시보드 — 2026 YTD</title>
<style>
:root {
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --accent2:#7ee787;
  --warn:#f85149; --warn2:#ffa657; --gold:#d2a8ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);z-index:9999}
.login-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:40px;width:90%;max-width:380px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.login-box h1{font-size:18px;margin-bottom:8px;color:var(--accent)}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:24px}
.login-box input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-box button{width:100%;padding:12px;background:var(--accent);color:#0d1117;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:14px}
.login-box button:hover{background:#79b8ff}
.login-err{color:var(--warn);font-size:12px;margin-top:10px;min-height:16px}
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--panel);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sidebar h2{padding:0 20px 16px;font-size:13px;color:var(--accent);font-weight:600;border-bottom:1px solid var(--border);margin-bottom:12px}
.nav-item{display:block;padding:10px 20px;color:var(--muted);text-decoration:none;font-size:13px;cursor:pointer;border-left:3px solid transparent}
.nav-item:hover{background:var(--panel2);color:var(--text)}
.nav-item.active{background:var(--panel2);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.main{flex:1;padding:24px 32px;overflow-x:auto;max-width:calc(100vw - 220px)}
.section{display:none}
.section.active{display:block}
.section-header{margin-bottom:18px}
.section-header h1{font-size:22px;font-weight:600;margin-bottom:4px}
.section-header .sub{color:var(--muted);font-size:13px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px}
.kpi .label{font-size:12px;color:var(--muted);margin-bottom:8px}
.kpi .val{font-size:24px;font-weight:700;color:var(--text)}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:6px}
.kpi.acc{border-left:3px solid var(--accent2)}
.kpi.warn{border-left:3px solid var(--warn2)}
.kpi.alert{border-left:3px solid var(--warn)}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:18px}
.panel h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
td{padding:9px 8px;border-bottom:1px solid var(--border)}
td.num{text-align:right;font-variant-numeric:tabular-nums}
tr:hover td{background:rgba(255,255,255,.02)}
.bar{display:inline-block;height:8px;background:var(--accent);border-radius:2px;vertical-align:middle}
.heatmap{overflow-x:auto;margin-top:8px}
.heatmap table{font-size:10px;min-width:800px}
.heatmap th{padding:6px 4px;font-size:9px;writing-mode:vertical-rl;text-orientation:mixed;height:120px;vertical-align:bottom;color:var(--text);text-transform:none;letter-spacing:0}
.heatmap th:first-child{writing-mode:horizontal-tb;height:auto;text-align:left}
.heatmap td{padding:6px 4px;text-align:center;font-variant-numeric:tabular-nums;color:#fff;font-weight:500}
.heatmap td:first-child{text-align:left;color:var(--text);background:transparent}
.toggle-btn{padding:6px 12px;background:var(--panel2);color:var(--muted);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;margin-right:8px}
.toggle-btn.active{background:var(--accent);color:#0d1117;border-color:var(--accent)}
.insight-box{background:linear-gradient(135deg,rgba(88,166,255,.08) 0%,rgba(126,231,135,.08) 100%);border:1px solid rgba(88,166,255,.3);border-radius:8px;padding:14px 18px;margin:14px 0}
.insight-box h4{font-size:12px;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.insight-box ul{list-style:none;padding:0}
.insight-box li{padding:4px 0;font-size:13px;color:var(--text);position:relative;padding-left:18px}
.insight-box li:before{content:"▸";position:absolute;left:0;color:var(--accent2)}
.cagr-box{display:inline-block;padding:8px 14px;background:var(--panel2);border:1px solid var(--border);border-radius:6px;margin-right:10px;font-size:13px}
.cagr-box .lab{color:var(--muted);font-size:11px;margin-right:8px}
.cagr-box .v{font-weight:600;font-variant-numeric:tabular-nums}
.pos{color:var(--accent2)}.neg{color:var(--warn)}.neut{color:var(--muted)}
.month-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin:14px 0}
.month-cell{padding:10px 6px;background:var(--panel2);border-radius:4px;text-align:center;font-size:10px}
.month-cell .m{color:var(--muted);font-size:9px;margin-bottom:4px}
.month-cell .v{font-weight:600;font-variant-numeric:tabular-nums}
.bar-row{display:flex;align-items:center;margin:8px 0;font-size:12px}
.bar-row .lab{width:140px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .bar-track{flex:1;height:18px;background:var(--bg);border-radius:3px;position:relative;margin:0 10px}
.bar-row .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px}
.bar-row .v{width:90px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text)}
.waterfall{display:flex;align-items:flex-end;height:200px;gap:4px;padding:14px 0;overflow-x:auto}
.wf-col{flex:1;min-width:50px;display:flex;flex-direction:column;align-items:center;font-size:10px;color:var(--muted)}
.wf-col .bar{width:100%;background:var(--accent);min-height:2px;border-radius:2px 2px 0 0}
.wf-col.neg .bar{background:var(--warn)}
.wf-col .v{margin-top:4px;font-size:10px;color:var(--text);font-variant-numeric:tabular-nums}
.year-toggle{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px;margin-bottom:10px}
.year-toggle button{padding:6px 12px;background:transparent;color:var(--muted);border:none;cursor:pointer;font-size:12px;border-radius:4px}
.year-toggle button.active{background:var(--accent);color:#0d1117}
.src-list{font-size:12px;color:var(--muted);line-height:2}
.src-list li{margin-left:18px}
.update-time{font-size:11px;color:var(--muted)}
.flex{display:flex}.gap{gap:14px}
.col-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (max-width:768px) {
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;padding:8px 0;display:flex;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar h2{display:none}
  .nav-item{padding:8px 12px;border-left:none;border-bottom:3px solid transparent;font-size:11px;white-space:nowrap;flex-shrink:0}
  .nav-item.active{border-left:none;border-bottom-color:var(--accent)}
  .main{padding:14px;max-width:100vw}
  .col-2{grid-template-columns:1fr}
  .month-grid{grid-template-columns:repeat(6,1fr)}
  .heatmap th{height:80px;font-size:8px}
}
</style>
</head>

<div id="login">
  <div class="login-box">
    <h1>CEO 대시보드</h1>
    <p>2026 YTD · 결산 리뷰</p>
    <input type="password" id="pw" placeholder="패스워드" autocomplete="off">
    <button onclick="unlock()">열기</button>

</div>

function b64decode(s){const bin=atob(s);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr}

async function unlock(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  if(!pw){err.textContent='패스워드를 입력해 주세요'; return}
  try{
    const enc = new TextEncoder();
    const keyMat = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64decode(ENC.salt), iterations:100000, hash:'SHA-256'},
      keyMat, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const ct = b64decode(ENC.ct);
    const iv = b64decode(ENC.iv);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    const txt = new TextDecoder().decode(pt);
    window.DATA = JSON.parse(txt);
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  }catch(e){
    err.textContent = '패스워드가 올바르지 않습니다';
  }
}

document.addEventListener('keypress', e => { if(e.key==='Enter' && document.getElementById('login').style.display!=='none') unlock(); });

const fmt = {
  won: v => (v/1e8).toFixed(2)+'억',
  wonM: v => (v/1e6).toFixed(0)+'M',
  pct: v => (v*100).toFixed(1)+'%',
  pctSign: v => (v>=0?'+':'')+(v*100).toFixed(1)+'%',
  num: v => Math.round(v).toLocaleString('ko-KR'),
  cls: v => v>=0?'pos':'neg'
};

const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function render(){
  document.querySelectorAll('.nav-item').forEach(el => {
    el.onclick = () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      renderSection(el.dataset.target);
    };
  });
  renderSection('summary');
}

function renderSection(name){
  const main = document.getElementById('main');
  const D = window.DATA;
  const fns = {summary, channel, sku, matrix, pnl, yoy, multiyear, target, sources};
  main.innerHTML = '';
  fns[name](main, D);
}

function summary(main, D){
  const k = D.kpi;
  main.innerHTML = `
    <div class="section-header">
      <h1>2026 YTD 요약</h1>
      <div class="sub">${D.meta.period_label} · 갱신: ${D.meta.updated_at.replace('T',' ').replace('+09:00',' KST')}</div>
    </div>

function renderHeatmap(D){
  const el = document.getElementById('heatmap');
  const chs = D.top_channels;
  const sks = D.top_skus;
  const m = D.matrix_top;
  let max = 0;
  chs.forEach(c => sks.forEach(s => { const v = m[c]?.[s] || 0; if(v>max) max=v; }));
  let html = '<table><thead><tr><th>채널 \\ SKU</th>';
  sks.forEach(s => html += `<th title="${s}">${s.length>15?s.substr(0,15)+'…':s}</th>`);
  html += '</tr></thead><tbody>';
  chs.forEach(c => {
    html += `<tr><td title="${c}">${c.length>14?c.substr(0,14)+'…':c}</td>`;
    sks.forEach(s => {
      const v = m[c]?.[s] || 0;
      const ratio = max ? v/max : 0;
      let bg = 'transparent';
      if(matrixMode==='heat') {
        if(v>0) {
          const alpha = 0.15 + ratio*0.85;
          bg = `rgba(88,166,255,${alpha})`;
        }
      } else {
        if(v>0) bg = `rgba(88,166,255,${0.05 + ratio*0.4})`;
      }
      const display = v>=1e8 ? (v/1e8).toFixed(1)+'억' : v>=1e6 ? Math.round(v/1e6)+'M' : v>0 ? Math.round(v/1e3)+'K' : '-';
      html += `<td style="background:${bg}" title="${c} × ${s}: ${fmt.num(v)}원">${display}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

        <li><b>이익 회복:</b> 2022 영업이익 ${fmt.won(vals[0].oi)} → 2025 ${fmt.won(vals[3].oi)} (${vals[0].oi<0&&vals[3].oi>0?'적자→흑자 전환':'개선'})</li>
        <li><b>2026 페이스:</b> Q1만에 영업이익 ${fmt.won(vals[4].oi)} (2025 연간 ${fmt.won(vals[3].oi)} 대비 ${fmt.pct(vals[4].oi/vals[3].oi)})</li>
        <li><b>이익률 트렌드:</b> ${years.map((y,i)=>`${y}: ${fmt.pct(vals[i].oi_margin)}`).join(' / ')}</li>
      </ul>
    </div>
  `;
}

function target(main, D){
  const k = D.kpi;
  const ach = k.achievement_rate;
  const ct = D.channel_targets;
  const c2026 = D.channel_total_2026;
  // Map raw channels to target channel names (heuristic)
  const channelMap = {
    '아성다이소': '다이소',
    'H/B_씨제이올리브영': '올영',
    '온_네이버': '네이버',
    '쿠팡': '쿠팡',
  };
  // Aggregate by target name
  const ytdByTarget = {};
  Object.entries(c2026).forEach(([raw, v]) => {
    let mapped = channelMap[raw] || null;
    if(!mapped){
      if(raw.startsWith('해외_') || raw.toLowerCase().includes('amazon') || raw.includes('큐텐') || raw.includes('아마존')) mapped='해외';
      else if(raw.includes('자사몰') || raw.includes('카페24')) mapped='자사몰';
      else mapped = '그 외';
    }
    ytdByTarget[mapped] = (ytdByTarget[mapped]||0) + v;
  });
  main.innerHTML = `
    <div class="section-header">
      <h1>목표 대비 달성</h1>
      <div class="sub">2026 연간 목표 ${fmt.won(k.annual_target_rev)} · YTD ${fmt.won(k.ytd_rev)} (${fmt.pct(ach)})</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi acc"><div class="label">전사 목표 달성률</div><div class="val">${fmt.pct(ach)}</div><div class="sub">선형 25% 대비 ${ach>=0.25?'+':''}${((ach-0.25)*100).toFixed(1)}pt</div></div>
      <div class="kpi"><div class="label">연간 목표 잔여</div><div class="val">${fmt.won(k.annual_target_rev - k.ytd_rev)}</div><div class="sub">9개월 남음, 월평균 ${fmt.won((k.annual_target_rev - k.ytd_rev)/9)} 필요</div></div>
    </div>
    <div class="panel">
      <h3>채널별 목표 달성률 (그룹화)</h3>
      <table>
        <thead><tr><th>채널</th><th class="num">YTD 매출</th><th class="num">연간 목표</th><th class="num">달성률</th><th>진척도</th></tr></thead>
        <tbody>
          ${Object.entries(ct).map(([ch, tg]) => {
            const ytd = ytdByTarget[ch] || 0;
            const rate = tg ? ytd/tg : 0;
            return `<tr><td>${ch}</td><td class="num">${fmt.won(ytd)}</td><td class="num">${fmt.won(tg)}</td><td class="num ${rate>=0.25?'pos':'neut'}">${fmt.pct(rate)}</td><td><div class="bar-track" style="width:160px"><div class="bar-fill" style="width:${Math.min(100,rate*100*4).toFixed(1)}%"></div></div></td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="insight-box">
      <h4>목표 인사이트</h4>
      <ul>
        <li><b>전사 페이스:</b> Q1 ${fmt.pct(ach)} 달성, 분기당 25% 페이스 대비 ${ach>=0.25?'우위':'미달'} (${((ach-0.25)*100).toFixed(1)}pt)</li>
        <li><b>잔여 9개월 필요 매출:</b> 월평균 ${fmt.won((k.annual_target_rev-k.ytd_rev)/9)}</li>
        <li><b>현재 페이스 연간 추정:</b> ${fmt.won(k.ytd_rev*4)} (목표 대비 ${fmt.pct(k.ytd_rev*4/k.annual_target_rev)})</li>
        <li><b>채널 그룹 매핑은 휴리스틱:</b> 정확한 목표 대비 비교는 회계팀 산식 기준</li>
      </ul>
    </div>
  `;
}
