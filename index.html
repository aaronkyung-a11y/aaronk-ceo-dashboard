<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO 대시보드 — 2026 결산리뷰 (26.03 반영)</title>
<style>
:root{
  --bg:#0b0f17; --bg2:#121826; --panel:#1a2233; --panel2:#222b40;
  --border:#2a3450; --text:#e8eef9; --muted:#94a3b8;
  --accent:#3b82f6; --accent2:#06b6d4; --good:#10b981; --bad:#ef4444; --warn:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Pretendard','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;font-size:14px}
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0b0f17 0%,#1a2233 100%);z-index:9999}
.login-box{background:var(--panel);padding:36px;border-radius:14px;border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.4);width:90%;max-width:380px;text-align:center}
.login-box h1{font-size:20px;margin-bottom:8px}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:18px}
.login-box input{width:100%;padding:12px 14px;border:1px solid var(--border);background:var(--bg2);
  color:var(--text);border-radius:8px;font-size:15px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:12px;border:none;background:var(--accent);color:#fff;
  border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.login-box button:hover{background:#2563eb}
.login-box .err{color:var(--bad);font-size:13px;margin-top:10px;min-height:18px}
.app{display:none}
.app.active{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:18px 12px;
  position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.brand{font-size:13px;color:var(--muted);margin-bottom:4px}
.brand b{color:var(--text)}
.title{font-size:15px;font-weight:700;margin-bottom:18px}
.nav-item{display:block;padding:9px 12px;color:var(--muted);text-decoration:none;border-radius:7px;
  font-size:13.5px;cursor:pointer;margin-bottom:2px;transition:all .15s}
.nav-item:hover{background:var(--panel);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff}
.main{flex:1;padding:24px 28px;max-width:100%;overflow-x:hidden}
.section{display:none}
.section.active{display:block;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.section-head h2{font-size:18px}
.section-head .sub{color:var(--muted);font-size:12.5px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--border);padding:14px 16px;border-radius:10px}
.kpi .label{color:var(--muted);font-size:12px;margin-bottom:6px}
.kpi .val{font-size:22px;font-weight:700}
.kpi .val.good{color:var(--good)}
.kpi .val.bad{color:var(--bad)}
.kpi .val.warn{color:var(--warn)}
.kpi .delta{font-size:11.5px;margin-top:4px;color:var(--muted)}
.kpi .delta.good{color:var(--good)}
.kpi .delta.bad{color:var(--bad)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px}
.card h3{font-size:14.5px;margin-bottom:14px;color:var(--text)}
.insight{background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(6,182,212,.05));
  border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.insight-title{font-size:12px;color:var(--accent2);font-weight:600;letter-spacing:.4px;margin-bottom:8px;text-transform:uppercase}
.insight ul{list-style:none}
.insight li{font-size:13px;padding:5px 0;display:flex;gap:8px;line-height:1.55}
.insight li::before{content:'▸';color:var(--accent);flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--border)}
th:first-child,td:first-child{text-align:left}
th{color:var(--muted);font-weight:500;font-size:11.5px;background:var(--bg2);text-transform:uppercase;letter-spacing:.3px}
tr:hover td{background:rgba(59,130,246,.04)}
.bar{display:inline-block;height:14px;background:var(--accent);border-radius:3px;vertical-align:middle;margin-right:6px}
.heatmap{overflow-x:auto;margin:12px 0}
.heat-table{font-size:10.5px;min-width:100%}
.heat-table th,.heat-table td{padding:5px 6px;border:1px solid var(--border)}
.heat-cell{display:block;text-align:center;padding:4px 2px;border-radius:3px;font-weight:500}
.toggle-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 12px;
  border-radius:6px;font-size:12px;cursor:pointer}
.toggle-btn.on{background:var(--accent);border-color:var(--accent)}
.chart{position:relative;height:280px;margin:8px 0}
.chart svg{width:100%;height:100%;overflow:visible}
.cagr-box{display:inline-block;background:var(--panel2);border:1px solid var(--accent);
  border-radius:8px;padding:8px 14px;margin-right:8px;font-size:13px}
.cagr-box .v{font-size:16px;font-weight:700;color:var(--accent2)}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:8px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px}
.tabbar{display:none;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);padding:8px;gap:6px}
.tabbar .nav-item{display:inline-block;padding:7px 12px;font-size:12px;white-space:nowrap}
@media (max-width:768px){
  .sidebar{display:none}
  .tabbar{display:flex}
  .main{padding:14px 12px}
  .kpi .val{font-size:18px}
  .section-head h2{font-size:16px}
  .card{padding:12px}
  table{font-size:11px}
  th,td{padding:6px 5px}
}
.foot{color:var(--muted);font-size:11px;text-align:center;margin-top:20px;padding:12px}
.src-link{color:var(--accent2);text-decoration:none}
.src-link:hover{text-decoration:underline}
</style>
</head>

function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function decrypt(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ENC.iv)},key,b64d(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
let DATA=null;
async function doLogin(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  err.textContent='';
  try{ DATA=await decrypt(pw);
    document.getElementById('login').style.display='none';
    document.getElementById('app').classList.add('active');
    render();
  }catch(e){err.textContent='비밀번호가 올바르지 않습니다.'}
}
document.getElementById('pw').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin()});

const fmtEok=v=>(v/1e8).toFixed(2)+'억';
const fmtMok=v=>(v/1e8).toFixed(1)+'억';
const fmtPct=v=>(v*100).toFixed(1)+'%';
const fmtSign=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
const fmtMM=v=>(v/1e6).toFixed(0);

function heatColor(v,mx){
  if(!v||v<=0)return 'background:#0f1626;color:#475569';
  const i=Math.min(1,v/mx);
  const r=Math.round(15+i*40),g=Math.round(76+i*70),b=Math.round(176-i*30);
  return `background:rgb(${r},${g},${b});color:#fff`;
}

function render(){
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.onclick=()=>{
      document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
      n.classList.add('active');
      document.getElementById('sec-'+n.dataset.sec).classList.add('active');
      // sync the other navbar
      document.querySelectorAll('.nav-item[data-sec="'+n.dataset.sec+'"]').forEach(x=>x.classList.add('active'));
      window.scrollTo(0,0);
    };
  });
  renderSummary();
  renderChannel();
  renderSKU();
  renderMatrix();
  renderPnL();
  renderYoY();
  renderMultiyear();
  renderTarget();
  renderSources();
}

      <span><i style="background:rgb(55,180,110)"></i>고</span>
    </div>

    }
  };
}

        ${months.map((m,i)=>`<text x="${x(i)}" y="${h-15}" fill="#94a3b8" font-size="10" text-anchor="middle">${m}</text>`).join('')}

      <tr><td>매출원가 증가</td><td>${fmtEok(q1_25_cost)}</td><td>${fmtEok(q1_26_cost)}</td><td class="bad" style="color:var(--bad)">-${fmtEok(q1_26_cost-q1_25_cost)}</td></tr>
      <tr><td>판관비 증가</td><td>${fmtEok(q1_25_sga)}</td><td>${fmtEok(q1_26_sga)}</td><td class="bad" style="color:var(--bad)">-${fmtEok(q1_26_sga-q1_25_sga)}</td></tr>
      <tr style="background:var(--bg2)"><td><b>영업이익 변동</b></td><td><b>${fmtEok(q1_25_oi)}</b></td><td><b>${fmtEok(q1_26_oi)}</b></td><td><b style="color:var(--good)">+${fmtEok(q1_26_oi-q1_25_oi)}</b></td></tr>
    </tbody></table>
  </div>`;
}

function renderMultiyear(){
  const yrs=['2022','2023','2024','2025'];
  const at=DATA.annual_totals;
  const cagrRev=DATA.cagr['3yr_2022_2025'];
  const cagrOI=Math.sign(at['2025'].영업이익)===Math.sign(at['2022'].영업이익)&&at['2022'].영업이익!==0?Math.pow(at['2025'].영업이익/at['2022'].영업이익,1/3)-1:null;
  const w=560,h=220,pad=40;
  const maxRev=Math.max(...yrs.map(y=>at[y].매출), at['2026YTD'].매출*4);
  const xb=(i,n)=>pad+i*((w-2*pad)/n)+10;
  const yh=v=>(v/maxRev)*(h-2*pad);
  document.getElementById('sec-multiyear').innerHTML=`
  <div class="section-head"><h2>다년도 추이 (CAGR)</h2><div class="sub">2022 → 2025 + 2026 YTD</div></div>
  <div class="kpi-grid">
    <div class="cagr-box">3년 매출 CAGR<br><span class="v">${fmtSign(cagrRev)}</span></div>
    <div class="kpi"><div class="label">2022 매출</div><div class="val">${fmtEok(at['2022'].매출)}</div><div class="delta bad">영업이익 ${fmtEok(at['2022'].영업이익)}</div></div>
    <div class="kpi"><div class="label">2023 매출</div><div class="val">${fmtEok(at['2023'].매출)}</div><div class="delta">영업이익 ${fmtEok(at['2023'].영업이익)}</div></div>
    <div class="kpi"><div class="label">2024 매출</div><div class="val">${fmtEok(at['2024'].매출)}</div><div class="delta good">영업이익 ${fmtEok(at['2024'].영업이익)}</div></div>
    <div class="kpi"><div class="label">2025 매출</div><div class="val">${fmtEok(at['2025'].매출)}</div><div class="delta good">영업이익 ${fmtEok(at['2025'].영업이익)}</div></div>
    <div class="kpi"><div class="label">2026 YTD (Q1)</div><div class="val good">${fmtEok(at['2026YTD'].매출)}</div><div class="delta good">영업이익 ${fmtEok(at['2026YTD'].영업이익)}</div></div>
  </div>
  <div class="insight"><div class="insight-title">다년도 인사이트</div>
    <ul>
      <li>2022(86.2억) → 2025(97.2억): 3년 CAGR +${(cagrRev*100).toFixed(2)}% — 안정적 성장</li>
      <li>영업이익 대전환: 2022 -3.7억 (적자) → 2025 5.1억 (흑자), 4년 누적 +8.8억 개선</li>
      <li>2026 Q1만으로 이미 2025 연간 영업이익(5.1억)의 1.7배 (8.7억)</li>
      <li>2024 → 2025 매출 +23.4% — 다이소 채널 본격 확대가 동력</li>
    </ul>
  </div>
  <div class="card">
    <h3>연도별 매출 (억)</h3>
    <div class="chart">
      <svg viewBox="0 0 ${w} ${h}">
        ${yrs.concat(['2026YTD']).map((y,i,arr)=>{const v=at[y].매출;const bw=30;const xx=xb(i,arr.length);return `
          <rect x="${xx}" y="${h-pad-yh(v)}" width="${bw}" height="${yh(v)}" fill="${y==='2026YTD'?'#06b6d4':'#3b82f6'}" rx="3"/>
          <text x="${xx+bw/2}" y="${h-pad-yh(v)-5}" fill="#e8eef9" font-size="11" text-anchor="middle">${(v/1e8).toFixed(0)}억</text>
          <text x="${xx+bw/2}" y="${h-15}" fill="#94a3b8" font-size="10" text-anchor="middle">${y==='2026YTD'?'26 YTD':y}</text>`;}).join('')}
      </svg>
    </div>
  </div>
  <div class="card">
    <h3>연도별 영업이익 (억)</h3>
    <table><thead><tr><th>연도</th><th>매출</th><th>매출원가</th><th>판관비</th><th>영업이익</th><th>이익률</th></tr></thead><tbody>
    ${yrs.concat(['2026YTD']).map(y=>{const a=at[y];return `<tr><td>${y==='2026YTD'?'2026 YTD':y}</td><td>${fmtEok(a.매출)}</td><td>${fmtEok(a.원가)}</td><td>${fmtEok(a.판관비)}</td>
      <td style="color:${a.영업이익>=0?'var(--good)':'var(--bad)'}">${fmtEok(a.영업이익)}</td><td>${fmtPct(a.영업이익/a.매출)}</td></tr>`}).join('')}
    </tbody></table>
  </div>`;
}

function renderTarget(){
  const t=DATA.targets;
  const a=DATA.annual_totals['2026YTD'];
  const ch26=DATA.channels_2026_ytd;
  // Map channel name to actual
  const actualMap={
    '올영': ch26['H/B_씨제이올리브영']||0,
    '해외': Object.entries(ch26).filter(([k])=>!k.startsWith('온_')&&!k.startsWith('H/B_')&&!k.startsWith('아성다이소')&&!k.startsWith('기타_모스트')).reduce((s,[,v])=>s+v,0),
    '네이버': ch26['온_네이버']||0,
    '다이소': ch26['아성다이소']||0,
    '쿠팡': ch26['온_쿠팡']||0,
    '자사몰': ch26['온_카페24_네이버페이']+ch26['온_카페24_케이지모빌리언스']||0,
  };
  document.getElementById('sec-target').innerHTML=`
  <div class="section-head"><h2>목표 vs 실적</h2><div class="sub">2026 연간 목표 대비 Q1 진행률</div></div>
  <div class="kpi-grid">
    <div class="kpi"><div class="label">매출 목표</div><div class="val">${fmtEok(t.rev_target_2026)}</div>
      <div class="delta">YTD ${fmtEok(a.매출)} (${fmtPct(a.매출/t.rev_target_2026)})</div></div>
    <div class="kpi"><div class="label">영업이익 목표</div><div class="val">${fmtEok(t.opi_target_2026)}</div>
      <div class="delta">YTD ${fmtEok(a.영업이익)} (${fmtPct(a.영업이익/t.opi_target_2026)})</div></div>
    <div class="kpi"><div class="label">이익률 목표</div><div class="val">${fmtPct(t.opi_margin_target)}</div>
      <div class="delta ${a.영업이익/a.매출>=t.opi_margin_target?'good':'warn'}">YTD ${fmtPct(a.영업이익/a.매출)}</div></div>
  </div>
  <div class="insight"><div class="insight-title">목표 인사이트</div>
    <ul>
      <li>매출 진행률 ${fmtPct(a.매출/t.rev_target_2026)} — Q1만으로 연간목표의 1/4 수준 (선형 페이스 24%면 적정)</li>
      <li>영업이익은 YTD 8.7억으로 연간 목표 31.5억의 27.7% 달성 — 이익 페이스 양호</li>
      <li>이익률 ${fmtPct(a.영업이익/a.매출)}로 목표 ${fmtPct(t.opi_margin_target)} 초과 달성 중</li>
      <li>다이소 채널 연간 목표 91.1억 — Q1 18.3억으로 페이스 양호 (연환산 시 73.3억)</li>
    </ul>
  </div>
  <div class="card">
    <h3>채널별 연간 목표 vs YTD 실적 (억)</h3>
    <table><thead><tr><th>채널</th><th>연간 목표</th><th>Q1 실적</th><th>달성률</th><th>월평균 목표</th></tr></thead><tbody>
    ${Object.entries(t.channel_targets).map(([k,info])=>{
      const annual=parseFloat(info.annual)||0;
      const actual=actualMap[k]||0;
      return `<tr><td>${k}</td><td>${fmtEok(annual)}</td><td>${fmtEok(actual)}</td>
        <td>${fmtPct(actual/annual)}</td><td>${fmtEok(annual/12)}</td></tr>`;
    }).join('')}
    </tbody></table>
    <div class="legend"><span>* 채널명 매핑은 근사치 (자사몰=카페24계열 합산)</span></div>
  </div>`;
}
